combined_app_pack:
    outputfile: combined

    header:
        private_signing_key: ../root-rsa-2048.pem
        header-size: 0x400
        align: 4
        load-addr: 0x20080000
        pad-header: yes
        version: 1.0.0
        slot-size: 0x40000

    image1_pack:
        outputfile: image1
        header:
            private_signing_key: ../root-rsa-2048.pem
            header-size: 0x400
            align: 4
            load-addr: 0x20010000
            pad-header: yes
            version: 1.0.0
            slot-size: 0x10000
        image: image1.bin

    image2_pack:
        outputfile: image2
        header:
            private_signing_key: ../root-rsa-2048.pem
            header-size: 0x400
            align: 4
            load-addr: 0x20020000
            pad-header: yes
            version: 1.0.0
            slot-size: 0x10000
        image: image2.bin
